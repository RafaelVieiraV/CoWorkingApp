spring:
  application:
    name: coworking-app
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/coworking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: "clave-super-secreta-de-256-bits-para-coworking-app-espe"
  expiration-ms: 86400000