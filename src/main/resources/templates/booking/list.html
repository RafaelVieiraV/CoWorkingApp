<<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head}"/>
    <link th:href="@{/css/booking.css}" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <title>Reservas - CoWorking App</title>
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">

        <div class="page-header">
            <div>
                <h1 class="page-title">Reservas</h1>
                <p class="page-subtitle">Gestión de reservas del coworking</p>
            </div>
            <button class="btn-primary" onclick="openCreateModal()">
                <i class="bi bi-plus-lg"></i> Nueva Reserva
            </button>
        </div>

        <div class="filters-bar">
            <input type="text" id="searchId" class="filter-input" placeholder="Buscar por ID..."/>
            <select id="filterStatus" class="filter-input" onchange="applyFilters()">
                <option value="">Todos los estados</option>
                <option value="PENDING">Pendiente</option>
                <option value="CONFIRMED">Confirmada</option>
                <option value="CANCELLED">Cancelada</option>
            </select>
            <button class="btn-secondary" onclick="applyFilters()">
                <i class="bi bi-search"></i> Buscar
            </button>
            <button class="btn-ghost" onclick="clearFilters()">Limpiar</button>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Miembro</th>
                    <th>Espacio</th>
                    <th>Tipo</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Horas</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="bookingsBody">
                <tr>
                    <td colspan="10" class="text-center">Cargando...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>

        <!-- Modal Crear/Editar -->
        <div id="bookingModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Nueva Reserva</h2>
                    <button class="btn-close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div id="modalError" class="error-msg" style="display:none;"></div>
                <input type="hidden" id="editingId"/>
                <div class="form-group">
                    <label>Miembro</label>
                    <select id="formMemberId" class="form-input select2-field" style="width:100%">
                        <option value="">Buscar miembro...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Espacio</label>
                    <select id="formWorkspaceId" class="form-input select2-field" style="width:100%">
                        <option value="">Buscar espacio...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha/Hora Inicio</label>
                    <input type="datetime-local" id="formStartDatetime" class="form-input"/>
                </div>
                <div class="form-group">
                    <label>Fecha/Hora Fin</label>
                    <input type="datetime-local" id="formEndDatetime" class="form-input"/>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button class="btn-primary" onclick="saveBooking()">Guardar</button>
                </div>
            </div>
        </div>

        <!-- Modal Confirmar Eliminación -->
        <div id="deleteModal" class="modal-overlay hidden">
            <div class="modal-content modal-sm">
                <h2>¿Eliminar reserva?</h2>
                <p class="modal-text">Esta acción no se puede deshacer.</p>
                <input type="hidden" id="deleteId"/>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
                    <button class="btn-danger" onclick="confirmDelete()">Eliminar</button>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/i18n/es.js"></script>
<script th:src="@{/js/booking.js}"></script>
</body>
</html>
